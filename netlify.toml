[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/scan"
  to = "/.netlify/functions/scan"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/explain"
  to = "/.netlify/functions/explain"
  status = 200
